[build]
  command = "next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Official Next.js runtime for Netlify. Handles App Router, server components,
# API routes, middleware (next-intl locale routing) and image optimisation.
[[plugins]]
  package = "@netlify/plugin-nextjs"
